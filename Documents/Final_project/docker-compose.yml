
# Custom Hadoop images with Python 3.11 for ISM 6562 course
# Images maintained at: https://hub.docker.com/u/tcsmith314
# Based on Hadoop 3.2.1

services:
  # ============================
  #   HDFS Components (Stage 1)
  # ============================

  namenode:
    image: tcsmith314/hadoop-namenode-python311:latest
    container_name: sportlytics-namenode
    hostname: namenode
    ports:
      - "9870:9870"  # NameNode Web UI
      - "9000:9000"  # HDFS
    environment:
      - CLUSTER_NAME=sportlytics-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_namenode_name_dir=file:///hadoop/dfs/name
      - HDFS_CONF_dfs_permissions_enabled=false
      - HDFS_CONF_dfs_webhdfs_enabled=true
      - HDFS_CONF_dfs_replication=2
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./data:/data
      - ./scripts:/scripts
    networks:
      - sportlytics-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  datanode1:
    image: tcsmith314/hadoop-datanode-python311:latest
    container_name: sportlytics-datanode1
    hostname: datanode1
    ports:
      - "9864:9864"  # DataNode1 Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - datanode1_data:/hadoop/dfs/data
    networks:
      - sportlytics-network
    depends_on:
      namenode:
        condition: service_healthy

  datanode2:
    image: tcsmith314/hadoop-datanode-python311:latest
    container_name: sportlytics-datanode2
    hostname: datanode2
    ports:
      - "9865:9864"  # DataNode2 Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - datanode2_data:/hadoop/dfs/data
    networks:
      - sportlytics-network
    depends_on:
      namenode:
        condition: service_healthy

  datanode3:
    image: tcsmith314/hadoop-datanode-python311:latest
    container_name: sportlytics-datanode3
    hostname: datanode3
    ports:
      - "9866:9864"  # DataNode3 Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - datanode3_data:/hadoop/dfs/data
    networks:
      - sportlytics-network
    depends_on:
      namenode:
        condition: service_healthy

  # =============================
  #   YARN Components (Stage 1)
  # =============================

  resourcemanager:
    image: tcsmith314/hadoop-resourcemanager-python311:latest
    container_name: sportlytics-resourcemanager
    hostname: resourcemanager
    ports:
      - "8088:8088"  # ResourceManager Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - YARN_CONF_yarn_resourcemanager_hostname=resourcemanager
      - YARN_CONF_yarn_resourcemanager_address=resourcemanager:8032
      - YARN_CONF_yarn_resourcemanager_scheduler_address=resourcemanager:8030
      - YARN_CONF_yarn_resourcemanager_resource__tracker_address=resourcemanager:8031
      - YARN_CONF_yarn_log_aggregation_enable=true
      - YARN_CONF_yarn_nodemanager_remote__app__log__dir=/app-logs
    networks:
      - sportlytics-network
    depends_on:
      namenode:
        condition: service_healthy

  nodemanager1:
    image: tcsmith314/hadoop-nodemanager-python311:latest
    container_name: sportlytics-nodemanager1
    hostname: nodemanager1
    ports:
      - "8042:8042"  # NodeManager1 Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - YARN_CONF_yarn_resourcemanager_hostname=resourcemanager
      - YARN_CONF_yarn_resourcemanager_address=resourcemanager:8032
      - YARN_CONF_yarn_nodemanager_aux__services=mapreduce_shuffle
      - YARN_CONF_yarn_nodemanager_resource_memory__mb=4096
      - YARN_CONF_yarn_nodemanager_resource_cpu__vcores=2
      - YARN_CONF_yarn_nodemanager_vmem__check__enabled=false
      - YARN_CONF_yarn_log_aggregation_enable=true
      - YARN_CONF_yarn_nodemanager_remote__app__log__dir=/app-logs
    volumes:
      - nodemanager1_data:/hadoop/yarn/local
    networks:
      - sportlytics-network
    depends_on:
      - resourcemanager

  nodemanager2:
    image: tcsmith314/hadoop-nodemanager-python311:latest
    container_name: sportlytics-nodemanager2
    hostname: nodemanager2
    ports:
      - "8043:8042"  # NodeManager2 Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - YARN_CONF_yarn_resourcemanager_hostname=resourcemanager
      - YARN_CONF_yarn_resourcemanager_address=resourcemanager:8032
      - YARN_CONF_yarn_nodemanager_aux__services=mapreduce_shuffle
      - YARN_CONF_yarn_nodemanager_resource_memory__mb=4096
      - YARN_CONF_yarn_nodemanager_resource_cpu__vcores=2
      - YARN_CONF_yarn_nodemanager_vmem__check__enabled=false
      - YARN_CONF_yarn_log_aggregation_enable=true
      - YARN_CONF_yarn_nodemanager_remote__app__log__dir=/app-logs
    volumes:
      - nodemanager2_data:/hadoop/yarn/local
    networks:
      - sportlytics-network
    depends_on:
      - resourcemanager

  nodemanager3:
    image: tcsmith314/hadoop-nodemanager-python311:latest
    container_name: sportlytics-nodemanager3
    hostname: nodemanager3
    ports:
      - "8044:8042"  # NodeManager3 Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - YARN_CONF_yarn_resourcemanager_hostname=resourcemanager
      - YARN_CONF_yarn_resourcemanager_address=resourcemanager:8032
      - YARN_CONF_yarn_nodemanager_aux__services=mapreduce_shuffle
      - YARN_CONF_yarn_nodemanager_resource_memory__mb=4096
      - YARN_CONF_yarn_nodemanager_resource_cpu__vcores=2
      - YARN_CONF_yarn_nodemanager_vmem__check__enabled=false
      - YARN_CONF_yarn_log_aggregation_enable=true
      - YARN_CONF_yarn_nodemanager_remote__app__log__dir=/app-logs
    volumes:
      - nodemanager3_data:/hadoop/yarn/local
    networks:
      - sportlytics-network
    depends_on:
      - resourcemanager

  # =====================================
  #   MapReduce History Server (Stage 1)
  # =====================================

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: sportlytics-historyserver
    hostname: historyserver
    ports:
      - "8188:8188"  # History Server Web UI (actual port)
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - YARN_CONF_yarn_log_aggregation_enable=true
      - YARN_CONF_yarn_nodemanager_remote__app__log__dir=/app-logs
    networks:
      - sportlytics-network
    depends_on:
      namenode:
        condition: service_healthy
  
  # =============================
  #   Spark Components (Stage 2)
  # =============================
 
  spark-master:
    image: apache/spark:3.5.0
    container_name: sportlytics-spark-master
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"  # Spark Master Web UI
      - "7077:7077"  # Spark Master RPC port (workers + driver connect here)
      - "4040:4040"  # Spark Application UI (active during job execution)
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    volumes:
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
    networks:
      - sportlytics-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
 
  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: sportlytics-spark-worker-1
    hostname: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"  # Worker 1 Web UI
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - spark-worker-1-data:/opt/spark/work-dir
      - ./data:/home/jovyan/data
    networks:
      - sportlytics-network
    depends_on:
      spark-master:
        condition: service_healthy
 
  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: sportlytics-spark-worker-2
    hostname: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8082:8081"  # Worker 2 Web UI
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - spark-worker-2-data:/opt/spark/work-dir
      - ./data:/home/jovyan/data
    networks:
      - sportlytics-network
    depends_on:
      spark-master:
        condition: service_healthy
 
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: sportlytics-jupyter
    hostname: spark-jupyter
    ports:
      - "8888:8888"  # Jupyter Web UI
    environment:
      - JUPYTER_TOKEN=spark
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
      - PYSPARK_DRIVER_PYTHON=/opt/conda/bin/python3
    volumes:
      - ./notebooks:/home/jovyan/notebooks   # Stage 2 notebook lives here
      - ./data:/home/jovyan/data             # Local data access
      - jupyter-data:/home/jovyan/work
    networks:
      - sportlytics-network
    depends_on:
      spark-master:
        condition: service_healthy
      namenode:
        condition: service_healthy
 
  # ==============================
  #   Kafka + Zookeeper (Stage 3)
  # ==============================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sportlytics-zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"   
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000             
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat,conf,mntr"
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms384m"
    mem_limit: 512m
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - sportlytics-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sportlytics-kafka
    hostname: kafka
    ports:
      - "9092:9092"     
      - "29092:29092"   
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"   
      KAFKA_NUM_PARTITIONS: 3                   
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1       
      KAFKA_LOG_RETENTION_HOURS: 168            
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    mem_limit: 1g
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - sportlytics-network
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 40s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sportlytics-kafka-ui
    hostname: kafka-ui
    ports:
      - "8089:8080"   
    environment:
      KAFKA_CLUSTERS_0_NAME: sportlytics-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092     
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    mem_limit: 512m
    networks:
      - sportlytics-network
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ==================================
  #   Airflow Orchestration (Stage 4)
  # ==================================


networks:
  sportlytics-network:
    driver: bridge

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:
  datanode3_data:
  nodemanager1_data:
  nodemanager2_data:
  nodemanager3_data:
  spark-worker-1-data:
  spark-worker-2-data:
  jupyter-data:
  zookeeper-data:       
  zookeeper-logs:       
  kafka-data: 
